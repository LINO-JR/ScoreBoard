<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Lino S Repaso Jr.">
    <meta name="description" content="Scrimba Pro Scoreboard Challenge">
    <meta name="keywords" content="Scoreboard, JavaScript, Tutorial, Lino, Tutorial, Scrimba">
    <title>Scoreboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="score-container">
        <div id="home">
            <h2>HOME</h2>
            <p class="display-score" id="home-score"> 0 </p>
            <div class="btn-container">
                <button class="btn" onclick="home1()">+1</button>
                <button class="btn" onclick="home2()">+2</button>
                <button class="btn" onclick="home3()">+3</button>
            </div>
        </div>
        <div id="guess">
            <h2>GUEST</h2>
            <p class="display-score" id="guess-score"> 0 </p>
            <div class="btn-container">
                <button class="btn" onclick="guess1()">+1</button>
                <button class="btn" onclick="guess2()">+2</button>
                <button class="btn" onclick="guess3()">+3</button>
            </div>
        </div>
    </div>
<script src="index.js"></script>
</body>
</html>
